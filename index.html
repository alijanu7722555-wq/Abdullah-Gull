<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Services</title>
    <meta name='robots' content='noindex, nofollow' />

    <style>
        :root {
            --wp--preset--color--black: #000000;
            --wp--preset--color--white: #ffffff;
            --wp--preset--color--vivid-cyan-blue: #0693e3;
            --wp--preset--gradient--vivid-cyan-blue-to-vivid-purple: linear-gradient(135deg,rgb(6,147,227) 0%,rgb(155,81,224) 100%);
        }
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        a {
            color: #BFF747;
            text-decoration: none;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        header {
            padding: 40px 0;
            text-align: center;
        }
        .hero {
            text-align: center;
            padding: 120px 0 80px;
        }
        .hero h1 {
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 24px;
        }
        .hero p {
            font-size: 1.6rem;
            max-width: 800px;
            margin: 0 auto 40px;
            color: #ddd;
        }
        .btn {
            background: #BFF747;
            color: #000;
            padding: 16px 48px;
            border-radius: 999px;
            font-size: 1.2rem;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(191,247,71,0.3);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 80px;
            flex-wrap: wrap;
            padding: 60px 0;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 4.5rem;
            font-weight: 800;
            color: #BFF747;
        }
        .stat-text {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 12px;
        }
        .clients {
            padding: 100px 0;
            text-align: center;
        }
        .clients h2 {
            margin-bottom: 60px;
            font-size: 3rem;
        }
        .client-logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 60px;
            filter: grayscale(70%);
            opacity: 0.8;
        }
        .client-logos img {
            height: 60px;
            max-width: 180px;
            object-fit: contain;
        }
        footer {
            padding: 80px 0 40px;
            text-align: center;
            color: #777;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        @media (max-width: 1024px) {
            .hero h1 { font-size: 4rem; }
            .stats { gap: 50px; }
        }
        @media (max-width: 768px) {
            .hero { padding: 80px 0 60px; }
            .hero h1 { font-size: 3rem; }
            .stats { flex-direction: column; gap: 40px; }
            .client-logos img { height: 50px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div style="font-size:3.5rem; font-weight:900; color:#BFF747; letter-spacing:-2px;">
                YOUR BRAND
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>We Elevate Brand Success</h1>
            <p>Trusted strategies to maximize revenue on Amazon through proven optimization, advertising, and account management.</p>
            <a href="#" class="btn">Get Started</a>
        </div>
    </section>

    <section class="stats">
        <div class="container">
            <div class="stat">
                <div class="stat-number">500+</div>
                <div class="stat-text">Amazon Brands</div>
            </div>
            <div class="stat">
                <div class="stat-number">$500M+</div>
                <div class="stat-text">Revenue Generated</div>
            </div>
            <div class="stat">
                <div class="stat-number">200+</div>
                <div class="stat-text">Team Members</div>
            </div>
        </div>
    </section>

    <section class="clients">
        <div class="container">
            <h2>Trusted by Leading Brands</h2>
            <div class="client-logos">
                <!-- Agar apne brands ke logos daalne hain to yahan daal sakte ho -->
                <img src="https://via.placeholder.com/180x60/222/555?text=Brand" alt="">
                <img src="https://via.placeholder.com/180x60/222/555?text=Brand" alt="">
                <img src="https://via.placeholder.com/180x60/222/555?text=Brand" alt="">
                <img src="https://via.placeholder.com/180x60/222/555?text=Brand" alt="">
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2025. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
